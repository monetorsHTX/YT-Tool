<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: sans-serif;
      width: 280px;
      padding: 16px;
      background: #0f0f0f;
      color: #f1f1f1;
      margin: 0;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 14px;
      color: #ff0000;
      letter-spacing: 0.5px;
    }

    #tab-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .tab-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #1a1a1a;
      border-radius: 6px;
      padding: 8px 10px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-shrink: 0;
    }

    .toggle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .toggle-label {
      font-size: 9px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .tab-title {
      font-size: 12px;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .empty {
      font-size: 12px;
      color: #aaa;
    }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 42px;
      min-width: 42px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: background 0.2s;
    }

    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider {
      background: #ff0000;
    }

    .switch-orange input:checked + .slider {
      background: #e67e00;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <h2>YouTube Looper</h2>
  <div id="tab-list"></div>
  <script src="popup.js"></script>
</body>
</html>
